<section class="about">

  <h2>Sobre mí</h2>

  <div class="about-container">

    <!-- Foto / avatar -->
    <div class="avatar">
      <img src="assets/images/perfil.jpeg" alt="{{name}}">
    </div>

    <!-- Texto personal y skills -->
    <div class="content">

      <h3>{{ name }}</h3>
      <h4>{{ role }}</h4>
      <p>{{ description }}</p>

      <!-- Skills -->
      <div class="skills">
        @for (skill of skills; track skill.name) {
          <div class="skill">
            <span class="skill-name">{{ skill.name }}</span>
            <span class="skill-level">{{ skill.level }}</span>
          </div>
        }
      </div>

      <!-- Achievements / logros -->
      <div class="achievements">
        <h5>Logros destacados:</h5>
        <ul>
          @for (item of achievements; track item) {
            <li>{{ item }}</li>
          }
        </ul>
      </div>

    </div>

  </div>

</section>
