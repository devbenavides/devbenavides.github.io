<section class="contact">
  <h2>Contacto</h2>

  <form class="contact-form" (submit)="submitForm()" #contactForm="ngForm" novalidate>

    <input 
      type="text" 
      name="name" 
      placeholder="Nombre" 
      [(ngModel)]="form().name" 
      required
    />
    <div class="error" *ngIf="contactForm.submitted && !form().name">
      Este campo es obligatorio
    </div>

    <input 
      type="email" 
      name="email" 
      placeholder="Email" 
      [(ngModel)]="form().email" 
      required
    />
    <div class="error" *ngIf="contactForm.submitted && !form().email">
      Este campo es obligatorio
    </div>

    <textarea 
      name="message" 
      rows="6" 
      placeholder="Mensaje" 
      [(ngModel)]="form().message" 
      required
    ></textarea>
    <div class="error" *ngIf="contactForm.submitted && !form().message">
      Este campo es obligatorio
    </div>

    <button type="submit">Enviar</button>
  </form>
</section>
